services:
  - type: web
    name: rohit
    plan: free
    env: docker
    dockerfilePath: Dockerfile
    repo: https://github.com/roh68210/Botfiress
    branch: main
    autoDeploy: false
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: OWNER
        sync: false
      - key: CREDIT
        sync: false
      - key: WEBHOOK
        sync: false
      - key: PORT
        value: 8800  # Default port value, update if needed
